<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS - Simulación Proyectiva Premium Avanzada</title>

    <!-- ✨ Librerías Externas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-base: #f4eee8;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(210, 180, 140, 0.3);
            --accent-warm: #d4a373;
            --accent-soft: #faedcd;
            --text-dark: #4a4a4a;
            --vector-v: #5b708b;
            --vector-a: #bc6c25;
            --vector-y: #606c38;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(212, 163, 115, 0.1) 0px, transparent 50%);
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }

        @media (max-width: 1050px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            position: relative;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            aspect-ratio: 16/9;
        }

        #mainCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .geogebra-tools {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn:hover {
            background: var(--accent-soft);
            border-radius: 6px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-card {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        h3 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-warm);
        }

        .slider-group {
            margin-bottom: 12px;
        }

        .label-val {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--accent-soft);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent-warm);
            cursor: pointer;
            margin-top: -6px;
            border: 2px solid white;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider-toggle {
            background-color: var(--accent-warm);
        }

        input:checked+.slider-toggle:before {
            transform: translateX(16px);
        }

        .math-display {
            padding: 10px;
            background: white;
            border-radius: 12px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .graphs-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .graph-box {
            background: white;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--glass-border);
            height: 160px;
        }

        .graph-title {
            font-size: 0.75rem;
            color: var(--accent-warm);
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        canvas.mini-canvas {
            width: 100%;
            height: 120px;
        }
    </style>
</head>

<body>

    <div class="main-container">
        <!-- 🔴 Área de Visualización -->
        <div class="visual-area">
            <div class="math-display" id="equation"></div>

            <div class="canvas-container" id="canvasWrapper">
                <canvas id="mainCanvas"></canvas>
                <div class="geogebra-tools">
                    <button class="tool-btn" onclick="zoom(0.9)"><i data-lucide="zoom-out"></i></button>
                    <button class="tool-btn" onclick="zoom(1.1)"><i data-lucide="zoom-in"></i></button>
                    <button class="tool-btn" onclick="resetView()"><i data-lucide="refresh-ccw"></i></button>
                </div>
            </div>

            <div class="graphs-grid">
                <div class="graph-box">
                    <div class="graph-title" id="lblPos">Posición y(t)</div>
                    <canvas id="cPos" class="mini-canvas"></canvas>
                </div>
                <div class="graph-box">
                    <div class="graph-title" id="lblVel">Velocidad v<sub>y</sub>(t)</div>
                    <canvas id="cVel" class="mini-canvas"></canvas>
                </div>
                <div class="graph-box">
                    <div class="graph-title" id="lblAcc">Aceleración a<sub>y</sub>(t)</div>
                    <canvas id="cAcc" class="mini-canvas"></canvas>
                </div>
            </div>
        </div>

        <!-- 🟠 Panel de Controles -->
        <div class="controls">
            <div class="control-card">
                <h3><i data-lucide="settings"></i> Parámetros</h3>

                <div class="slider-group">
                    <div class="label-val"><span>Amplitud (A)</span><span id="vA">80</span></div>
                    <input type="range" id="paramA" min="10" max="120" value="80">
                </div>

                <div class="slider-group">
                    <div class="label-val"><span>&omega; (rad/s)</span><span id="vW">1.50</span></div>
                    <input type="range" id="paramW" min="0.1" max="5" step="0.01" value="1.5">
                </div>

                <div class="slider-group">
                    <div class="label-val"><span>Periodo (T) [s]</span><span id="vT">4.19</span></div>
                    <input type="range" id="paramT" min="1.25" max="20" step="0.01" value="4.19">
                </div>

                <div class="slider-group">
                    <div class="label-val"><span>Fase &alpha; (rad)</span><span id="vPhi">0.00</span></div>
                    <input type="range" id="paramPhi" min="0" max="6.28" step="0.01" value="0">
                </div>

                <div class="toggle-row">
                    <span>Animación activa</span>
                    <label class="switch"><input type="checkbox" id="playToggle" checked><span
                            class="slider-toggle"></span></label>
                </div>
            </div>

            <div class="control-card">
                <h3><i data-lucide="layers"></i> Capas y Etiquetas</h3>
                <div class="toggle-row"><span>Puntos P, P' y &theta;</span><label class="switch"><input type="checkbox"
                            id="showLabels" checked><span class="slider-toggle"></span></label></div>
                <div class="toggle-row"><span>Velocidad (v, v<sub>y</sub>)</span><label class="switch"><input
                            type="checkbox" id="showVel" checked><span class="slider-toggle"></span></label></div>
                <div class="toggle-row"><span>Aceleración (a<sub>c</sub>, a<sub>y</sub>)</span><label
                        class="switch"><input type="checkbox" id="showAcc" checked><span
                            class="slider-toggle"></span></label></div>
                <div class="toggle-row"><span>Elongación (y)</span><label class="switch"><input type="checkbox"
                            id="showY" checked><span class="slider-toggle"></span></label></div>
                <div class="toggle-row"><span>Traza Senoidal</span><label class="switch"><input type="checkbox"
                            id="showTrace" checked><span class="slider-toggle"></span></label></div>
            </div>

            <div class="control-card" id="periodDisplay"
                style="font-size: 0.85rem; text-align: center; border-style: dashed;"></div>
        </div>
    </div>

    <script>
        /**
         * 🚀 SIMULADOR MAS PREMIUM - CORRECCIÓN DEL ÁNGULO THETA
         */
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const playToggle = document.getElementById('playToggle');

        const gPos = document.getElementById('cPos').getContext('2d');
        const gVel = document.getElementById('cVel').getContext('2d');
        const gAcc = document.getElementById('cAcc').getContext('2d');

        let state = {
            A: 80, w: 1.5, phi: 0, t: 0,
            zoom: 1.0, offset: { x: -120, y: 0 },
            history: []
        };

        lucide.createIcons();

        function updateMath() {
            const eq = `x(t) = ${state.A} \\cdot \\sin(${state.w.toFixed(2)}t + ${state.phi.toFixed(2)})`;
            const period = (2 * Math.PI / state.w).toFixed(2);

            katex.render(eq, document.getElementById('equation'));
            katex.render(`T = \\frac{2\\pi}{\\omega} = ${period} \\text{ s}`, document.getElementById('periodDisplay'));

            katex.render(`\\text{Posición } y(t)`, document.getElementById('lblPos'));
            katex.render(`\\text{Velocidad } v_y(t)`, document.getElementById('lblVel'));
            katex.render(`\\text{Aceleración } a_y(t)`, document.getElementById('lblAcc'));
        }

        function drawGrid(c, scale, off) {
            const w = c.canvas.width; const h = c.canvas.height;
            const cx = w / 2 + off.x; const cy = h / 2 + off.y;
            const step = 40 * scale;

            c.strokeStyle = 'rgba(0,0,0,0.04)';
            c.lineWidth = 1;
            for (let x = cx % step; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
            for (let y = cy % step; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }

            c.strokeStyle = 'rgba(0,0,0,0.2)'; c.lineWidth = 1.5;
            c.beginPath(); c.moveTo(0, cy); c.lineTo(w, cy); c.moveTo(cx, 0); c.lineTo(cx, h); c.stroke();
        }

        function drawArrow(c, x1, y1, x2, y2, color, label) {
            const head = 10; const angle = Math.atan2(y2 - y1, x2 - x1);
            c.strokeStyle = c.fillStyle = color; c.lineWidth = 2.5;
            c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
            c.beginPath(); c.moveTo(x2, y2);
            c.lineTo(x2 - head * Math.cos(angle - Math.PI / head), y2 - head * Math.sin(angle - Math.PI / 6));
            c.lineTo(x2 - head * Math.cos(angle + Math.PI / head), y2 - head * Math.sin(angle + Math.PI / 6));
            c.fill();
            if (label) {
                c.font = 'bold 13px sans-serif';
                c.fillText(label, x2 + 10 * Math.cos(angle), y2 + 10 * Math.sin(angle));
            }
        }

        function drawMiniGraph(c, data, key, color, maxVal) {
            const w = c.canvas.width; const h = c.canvas.height;
            c.clearRect(0, 0, w, h);
            c.strokeStyle = '#f0f0f0'; c.beginPath(); c.moveTo(0, h / 2); c.lineTo(w, h / 2); c.stroke();

            c.strokeStyle = color; c.lineWidth = 2; c.beginPath();
            data.forEach((d, i) => {
                const x = w - (data.length - i) * 1.5;
                const y = h / 2 - (d[key] / maxVal) * (h / 2.2);
                if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
            });
            c.stroke();
        }

        function animate() {
            if (playToggle.checked) state.t += 0.02;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid(ctx, state.zoom, state.offset);

            const cx = canvas.width / 2 + state.offset.x;
            const cy = canvas.height / 2 + state.offset.y;
            const s = state.zoom;

            // 📐 Cinemática corregida para seguir sentido antihorario estándar (Trigonométrico)
            // theta aumenta con el tiempo, partiendo desde phi
            const theta = state.w * state.t + state.phi;

            // Coordenadas en el círculo (x = cos, y = sin)
            const x = state.A * Math.cos(theta);
            const y = state.A * Math.sin(theta);

            // Proyección MAS (seguimos y)
            const vy = state.A * state.w * Math.cos(theta);
            const ay = -state.A * state.w * state.w * Math.sin(theta);

            const vTotal = state.A * state.w;

            if (playToggle.checked) {
                state.history.push({ y, vy, ay });
                if (state.history.length > 300) state.history.shift();
            }

            // 🔘 Círculo de referencia
            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.arc(cx, cy, state.A * s, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]);

            // 🔵 Partícula P (MCU)
            // En Canvas, Y crece hacia abajo, por eso restamos y
            const px = cx + x * s; const py = cy - y * s;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.strokeStyle = '#ddd'; ctx.stroke();

            // Etiquetas y Arco Theta
            if (document.getElementById('showLabels').checked) {
                ctx.fillStyle = '#000'; ctx.font = 'italic 16px serif';
                ctx.fillText("P", px + 12, py - 12);

                // --- CORRECCIÓN ARCO THETA ---
                // Dibujamos el arco desde el eje X (0 rad) hasta el ángulo actual
                // Note: En canvas, para que el arco visual coincida con el movimiento antihorario y
                // la inversión de Y, usamos los parámetros de inicio 0 y fin -theta.
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = varColor('--accent-warm');
                ctx.arc(cx, cy, 35 * s, 0, -theta % (Math.PI * 2), true);
                ctx.stroke();

                // Posicionamiento de la letra griega theta
                const labelTheta = (theta / 2);
                ctx.fillStyle = varColor('--accent-warm');
                ctx.fillText("θ", cx + 45 * s * Math.cos(labelTheta), cy - 45 * s * Math.sin(labelTheta));
            }

            // Vectores en Círculo
            if (document.getElementById('showVel').checked) {
                // Vector velocidad tangencial (perpendicular al radio)
                const vx_c = -vTotal * Math.sin(theta);
                const vy_c = vTotal * Math.cos(theta);
                drawArrow(ctx, px, py, px + vx_c * s * 0.3, py - vy_c * s * 0.3, varColor('--vector-v'), "v");
            }
            if (document.getElementById('showAcc').checked) {
                // Vector aceleración centrípeta (hacia el centro)
                drawArrow(ctx, px, py, px - x * s * 0.5, py + y * s * 0.5, varColor('--vector-a'), "a_c");
            }

            // --- PROYECCIÓN ---
            const prx = cx + 320 * s;
            const pry = cy - y * s;

            // Línea de proyección horizontal
            ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(prx, pry);
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.stroke(); ctx.setLineDash([]);

            // Eje de oscilación MAS
            ctx.lineWidth = 5; ctx.strokeStyle = '#f5f5f5'; ctx.beginPath();
            ctx.moveTo(prx, cy - state.A * s); ctx.lineTo(prx, cy + state.A * s); ctx.stroke();

            // Traza Senoidal
            if (document.getElementById('showTrace').checked) {
                ctx.beginPath(); ctx.strokeStyle = 'rgba(212, 163, 115, 0.3)'; ctx.lineWidth = 2;
                for (let i = 0; i < 250; i++) {
                    const t_trace = state.t - i * 0.05;
                    const y_trace = state.A * Math.sin(state.w * t_trace + state.phi);
                    if (i === 0) ctx.moveTo(prx + i * 1.2, cy - y_trace * s);
                    else ctx.lineTo(prx + i * 1.2, cy - y_trace * s);
                }
                ctx.stroke();
            }

            // Vectores en Proyección
            if (document.getElementById('showY').checked) {
                drawArrow(ctx, prx, cy, prx, pry, varColor('--vector-y'), "y");
            }
            if (document.getElementById('showVel').checked) {
                drawArrow(ctx, prx, pry, prx, pry - vy * s * 0.4, varColor('--vector-v'), "v_y");
            }
            if (document.getElementById('showAcc').checked) {
                drawArrow(ctx, prx, pry, prx, pry - ay * s * 0.1, varColor('--vector-a'), "a_y");
            }

            if (document.getElementById('showLabels').checked) {
                ctx.fillStyle = '#000'; ctx.fillText("P'", prx + 15, pry + 5);
            }

            // Partículas
            drawBall(ctx, px, py, 7 * s, varColor('--accent-warm'));
            drawBall(ctx, prx, pry, 9 * s, '#333');

            // Actualizar Mini Gráficas
            drawMiniGraph(gPos, state.history, 'y', varColor('--vector-y'), 140);
            drawMiniGraph(gVel, state.history, 'vy', varColor('--vector-v'), 600);
            drawMiniGraph(gAcc, state.history, 'ay', varColor('--vector-a'), 2500);

            requestAnimationFrame(animate);
        }

        function drawBall(c, x, y, r, color) {
            c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2);
            c.fillStyle = color; c.fill(); c.strokeStyle = '#fff'; c.lineWidth = 2.5; c.stroke();
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
        function zoom(f) { state.zoom *= f; state.zoom = Math.max(0.3, Math.min(2.5, state.zoom)); }
        function resetView() { state.zoom = 1.0; state.offset = { x: -120, y: 0 }; }

        const inputW = document.getElementById('paramW');
        const inputT = document.getElementById('paramT');
        const valW = document.getElementById('vW');
        const valT = document.getElementById('vT');

        inputW.oninput = () => {
            state.w = parseFloat(inputW.value);
            const t = 2 * Math.PI / state.w;
            inputT.value = t.toFixed(2);
            valW.innerText = state.w.toFixed(2);
            valT.innerText = t.toFixed(2);
            updateMath();
        };

        inputT.oninput = () => {
            const t = parseFloat(inputT.value);
            state.w = 2 * Math.PI / t;
            inputW.value = (2 * Math.PI / t).toFixed(2);
            valT.innerText = t.toFixed(2);
            valW.innerText = state.w.toFixed(2);
            updateMath();
        };

        document.getElementById('paramA').oninput = e => { state.A = +e.target.value; document.getElementById('vA').innerText = state.A; updateMath(); };
        document.getElementById('paramPhi').oninput = e => { state.phi = +e.target.value; document.getElementById('vPhi').innerText = state.phi.toFixed(2); updateMath(); };

        function resize() {
            const box = document.getElementById('canvasWrapper');
            canvas.width = box.clientWidth; canvas.height = box.clientHeight;
            [document.getElementById('cPos'), document.getElementById('cVel'), document.getElementById('cAcc')].forEach(c => {
                c.width = c.parentElement.clientWidth - 20; c.height = 120;
            });
        }

        window.addEventListener('resize', resize);
        resize(); updateMath(); animate();
    </script>
</body>

</html>
